<head>
<title>%Name%</title>
</head>
<body style="background-color: gray; font-family:Arial, Helvetica, sans-serif;color:white;">
    <a style="float: right;color:red; padding:10px;text-decoration: none;" href="/">X</a>
<div style="  margin: 0;
position: absolute;
top: 50%;
left: 50%;
-ms-transform: translate(-50%, -50%);
transform: translate(-50%, -50%); text-align: center; width: 100%;">
<label style="font-size: x-small;">%Type%</label>
<h2>%Name%</h2>
<h4>%Status%</h4>
<h4>Time: %FormatDate%</h4>
<p>%Content%</p>
<button style="cursor: pointer;border-radius: 10px;border: none;padding: 5px;margin: auto;margin-left: 10px;outline: none;width: 25%;background-color: rgb(0,230,0);" onclick="location = '/'">OK</button>
</div>
</body>
<script>
document.body.innerHTML = document.body.innerHTML.split("%FormatDate%").join(new Date('%Date%').toLocaleString())
</script>
